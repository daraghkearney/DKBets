name: Premier League season reminder

# One-shot email blast — run manually only (no schedule).
# Idempotent via data/email-campaigns/pl-season-reminder-2026.json
# Optional: set test_email to send one proofread copy without marking the campaign.
on:
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a test to this address only (leave blank to email all users once)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Send reminder emails
        run: npm run remind:world-cup
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REMINDER_FROM_EMAIL: ${{ vars.REMINDER_FROM_EMAIL }}
          NEXT_PUBLIC_WORLD_CUP_FREE_UNTIL: "2026-07-20T23:59:59Z"
          REMINDER_TEST_TO: ${{ inputs.test_email }}

      - name: Commit campaign marker
        if: always() && inputs.test_email == ''
        run: |
          if [ -n "$(git status --porcelain data/email-campaigns)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/email-campaigns
            git commit -m "Record pl-season-reminder-2026 email campaign progress."
            git push
          else
            echo "No campaign marker changes to commit"
          fi
