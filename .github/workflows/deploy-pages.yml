name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_odds:
        description: Fetch fresh Bet365 odds from odds-api.io (~3 API calls)
        type: boolean
        default: true
  schedule:
    # Hourly Bet365 refresh — ~3 odds-api.io calls/run (free tier: 100/hr)
    - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      REFRESH_BET365_ODDS: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.refresh_odds) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Restore Bet365 odds cache
        uses: actions/cache@v4
        with:
          path: .cache/bet365-live-odds.json
          key: bet365-live-v5
          restore-keys: bet365-live-v

      - name: Install
        run: npm ci

      - name: Probe odds-api.io quota
        if: env.REFRESH_BET365_ODDS == 'true'
        run: npm run probe:odds-api
        env:
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}

      - name: Export live data
        run: npm run export:data
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy if Pages was busy
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Deploy retry
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Fail if both deploy attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: exit 1
