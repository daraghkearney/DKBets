name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_odds:
        description: Fetch fresh Bet365 odds from odds-api.io (~3 API calls)
        type: boolean
        default: true
      web_research:
        description: Refresh Tavily web research (~3–5 queries per match; uses cache when false)
        type: boolean
        default: true
  schedule:
    # Hourly Bet365 refresh — ~3 odds-api.io calls/run (free tier: 100/hr)
    - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      REFRESH_BET365_ODDS: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.refresh_odds) }}
      REFRESH_WEB_RESEARCH: ${{ github.event_name == 'schedule' && 'false' || (github.event_name == 'workflow_dispatch' && !inputs.web_research && 'false') || 'true' }}
      HRN_FETCH_TOMORROW: ${{ github.event_name == 'workflow_dispatch' && inputs.web_research && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Restore Bet365 odds cache
        uses: actions/cache@v4
        with:
          path: .cache/bet365-live-odds.json
          key: bet365-live-v6
          restore-keys: bet365-live-v

      - name: Restore web research cache
        uses: actions/cache@v4
        with:
          path: .cache/web-research
          key: web-research-v1
          restore-keys: web-research-v1

      - name: Restore racing tipster cache
        uses: actions/cache@v4
        with:
          path: .cache/racing-tipsters
          key: racing-tipsters-v4-${{ github.run_id }}
          restore-keys: racing-tipsters-v4-

      - name: Restore racing model + prediction log
        uses: actions/cache@v4
        with:
          path: |
            .cache/racing-model
            .cache/racing-predictions
            .cache/racing-stats
            .cache/racing-hrnet
            .cache/atr-results
            .cache/racing-performance
          # run_id so updated weights/ledger are saved each deploy; restore prior v12
          key: racing-model-v12-${{ github.run_id }}
          restore-keys: |
            racing-model-v12-
            racing-model-v11-

      - name: Seed racing model if cache empty
        run: |
          mkdir -p .cache/racing-model .cache/racing-predictions .cache/racing-performance

          SEED=data/racing-model-seed/weights.json
          CACHE=.cache/racing-model/weights.json
          if [ ! -f "$CACHE" ]; then
            cp "$SEED" "$CACHE"
            echo "Seeded racing model from $SEED"
          else
            SAMPLES=$(node -e "try{console.log(require('./.cache/racing-model/weights.json').samples||0)}catch{console.log(0)}")
            if [ "$SAMPLES" = "0" ]; then
              cp "$SEED" "$CACHE"
              echo "Replaced empty cache weights with seed"
            else
              echo "Using cached racing model ($SAMPLES samples)"
            fi
          fi
          if [ -f data/racing-model-seed/backfill-state.json ] && [ ! -f .cache/racing-model/backfill-state.json ]; then
            cp data/racing-model-seed/backfill-state.json .cache/racing-model/backfill-state.json
            echo "Seeded backfill-state.json"
          fi

          # Performance ledger + prediction logs (track record needs both)
          LEDGER_SEED=data/racing-performance-seed/ledger.json
          LEDGER_CACHE=.cache/racing-performance/ledger.json
          if [ -f "$LEDGER_SEED" ]; then
            ENTRIES=0
            if [ -f "$LEDGER_CACHE" ]; then
              ENTRIES=$(node -e "try{console.log((require('./.cache/racing-performance/ledger.json').entries||[]).length)}catch{console.log(0)}")
            fi
            if [ ! -f "$LEDGER_CACHE" ] || [ "$ENTRIES" = "0" ]; then
              cp "$LEDGER_SEED" "$LEDGER_CACHE"
              echo "Seeded performance ledger ($(node -e "console.log(require('./data/racing-performance-seed/ledger.json').entries.length)") entries)"
            else
              echo "Using cached performance ledger ($ENTRIES entries)"
            fi
          fi

          if [ -d data/racing-performance-seed/predictions ]; then
            COPIED=0
            for f in data/racing-performance-seed/predictions/*.json; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              if [ ! -f ".cache/racing-predictions/$base" ]; then
                cp "$f" ".cache/racing-predictions/$base"
                COPIED=$((COPIED + 1))
              fi
            done
            echo "Seeded $COPIED prediction log(s)"
          fi

      - name: Install
        run: npm ci

      - name: Probe odds-api.io quota
        if: env.REFRESH_BET365_ODDS == 'true'
        run: npm run probe:odds-api
        env:
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}

      - name: Export live data
        run: npm run export:data
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          RACING_API_USERNAME: ${{ secrets.RACING_API_USERNAME }}
          RACING_API_PASSWORD: ${{ secrets.RACING_API_PASSWORD }}
          RACING_FETCH_HISTORY: "true"
          RACING_HISTORY_PER_RACE: "3"
          RACING_BACKFILL_DAYS: "30"
          RACING_BACKFILL_MAX_PER_RUN: "5"
          RACING_LEDGER_BACKFILL_MAX: "14"
          RACING_LEDGER_ENRICH_MAX: "7"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUBSCRIPTION_ENABLED: ${{ secrets.CLERK_PUBLISHABLE_KEY != '' && 'true' || 'false' }}
          NEXT_PUBLIC_WORLD_CUP_FREE_ENABLED: "false"
          NEXT_PUBLIC_WORLD_CUP_FREE_UNTIL: "2026-07-20T23:59:59Z"

      - name: Set base path
        id: base_path
        run: |
          if [ "${{ vars.USE_CUSTOM_DOMAIN }}" = "true" ]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard production Clerk key
        if: vars.USE_CUSTOM_DOMAIN == 'true'
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: |
          KEY="$(printf '%s' "$CLERK_PUBLISHABLE_KEY" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"
          if [ -z "$KEY" ]; then
            echo "No CLERK_PUBLISHABLE_KEY set — subscriptions stay disabled"
            exit 0
          fi
          if [[ "$KEY" == pk_test_* ]]; then
            echo "::error::CLERK_PUBLISHABLE_KEY is still pk_test_ but USE_CUSTOM_DOMAIN=true. Switch to pk_live_ from Clerk Production before go-live."
            exit 1
          fi
          # Clerk's isPublishableKey is stricter than a pk_live_ prefix check.
          # Malformed keys used to crash next build prerender; we now skip Clerk instead.
          if ! CLERK_PUBLISHABLE_KEY="$KEY" node -e "
            const { isPublishableKey } = require('@clerk/shared/keys');
            const key = (process.env.CLERK_PUBLISHABLE_KEY || '').trim();
            if (!isPublishableKey(key)) {
              console.error('INVALID');
              process.exit(1);
            }
            console.log('Clerk key OK for production (valid pk_live_*, length=' + key.length + ')');
          "; then
            echo "::warning::CLERK_PUBLISHABLE_KEY is set but not a valid Clerk publishable key (length=${#KEY}, prefix=${KEY:0:8}…). Re-copy pk_live_ from Clerk Dashboard → API Keys (Production). Deploy continues with subscriptions disabled so data can still update."
            {
              echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="
              echo "NEXT_PUBLIC_SUBSCRIPTION_ENABLED=false"
            } >> "$GITHUB_ENV"
          fi

      - name: Build static site
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base_path.outputs.path }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUBSCRIPTION_ENABLED: ${{ secrets.CLERK_PUBLISHABLE_KEY != '' && 'true' || 'false' }}
          NEXT_PUBLIC_WORLD_CUP_FREE_ENABLED: "false"
          NEXT_PUBLIC_WORLD_CUP_FREE_UNTIL: "2026-07-20T23:59:59Z"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy if Pages was busy
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Deploy retry
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Fail if both deploy attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: exit 1
